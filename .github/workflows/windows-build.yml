name: Windows Build

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'windows/**'
      - '.github/workflows/windows-build.yml'
  push:
    branches: [main, develop]
    paths:
      - 'windows/**'
      - '.github/workflows/windows-build.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build (Windows, ${{ matrix.platform }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, ARM64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore app for ${{ matrix.platform }}
        run: dotnet restore windows/src/TinyClips.App/TinyClips.App.csproj -p:Configuration=Release -p:Platform=${{ matrix.platform }}

      - name: Build app for ${{ matrix.platform }}
        run: dotnet build windows/src/TinyClips.App/TinyClips.App.csproj -c Release -p:Platform=${{ matrix.platform }} --no-restore

  test:
    name: Run Core Tests
    runs-on: windows-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore test project
        run: dotnet restore windows/tests/TinyClips.Core.Tests/TinyClips.Core.Tests.csproj

      - name: Run tests
        run: dotnet test windows/tests/TinyClips.Core.Tests/TinyClips.Core.Tests.csproj -c Release --no-restore
