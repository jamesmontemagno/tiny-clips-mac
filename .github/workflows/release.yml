name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

env:
  SCHEME: TinyClips
  PRODUCT_NAME: TinyClips
  SPARKLE_VERSION: "2.8.1"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Install Apple Developer ID certificate
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain

          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ${{ env.SCHEME }}.xcodeproj \
            -scheme ${{ env.SCHEME }}

      - name: Set Version Numbers
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          VERSION="${TAG#v}"
          BUILD_NUMBER="${{ github.run_number }}"

          echo "Setting MARKETING_VERSION to: $VERSION"
          echo "Setting CURRENT_PROJECT_VERSION to: $BUILD_NUMBER"

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" TinyClips/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" TinyClips/Info.plist

          echo "MARKETING_VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV

      - name: Build and Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project ${{ env.SCHEME }}.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -archivePath $RUNNER_TEMP/${{ env.PRODUCT_NAME }}.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY=- \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            MARKETING_VERSION=${{ env.MARKETING_VERSION }} \
            CURRENT_PROJECT_VERSION=${{ env.BUILD_NUMBER }} \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime"

      - name: List Available Signing Identities
        run: |
          echo "Available signing identities in temporary keychain:"
          security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db
          echo ""
          echo "Available signing identities in all keychains:"
          security find-identity -v -p codesigning

      - name: Export Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>$APPLE_TEAM_ID</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/${{ env.PRODUCT_NAME }}.xcarchive \
            -exportPath $RUNNER_TEMP/Export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Notarize App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/Export/${{ env.PRODUCT_NAME }}.app" \
            "$RUNNER_TEMP/${{ env.PRODUCT_NAME }}-notarize.zip"

          SUBMISSION_OUTPUT=$(xcrun notarytool submit "$RUNNER_TEMP/${{ env.PRODUCT_NAME }}-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)

          echo "$SUBMISSION_OUTPUT"

          SUBMISSION_ID=$(echo "$SUBMISSION_OUTPUT" | jq -r '.id')
          STATUS=$(echo "$SUBMISSION_OUTPUT" | jq -r '.status')

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS"
            echo "Fetching notarization log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

          echo "Notarization succeeded!"
          xcrun stapler staple "$RUNNER_TEMP/Export/${{ env.PRODUCT_NAME }}.app"

      - name: Create Distribution ZIP
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/Export/${{ env.PRODUCT_NAME }}.app" \
            "$RUNNER_TEMP/${{ env.PRODUCT_NAME }}-${{ env.RELEASE_TAG }}.zip"

      - name: Verify Signature
        run: |
          spctl -a -vv "$RUNNER_TEMP/Export/${{ env.PRODUCT_NAME }}.app"
          codesign -dvv "$RUNNER_TEMP/Export/${{ env.PRODUCT_NAME }}.app"

      - name: Download Sparkle
        run: |
          curl -L -o $RUNNER_TEMP/Sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${{ env.SPARKLE_VERSION }}/Sparkle-${{ env.SPARKLE_VERSION }}.tar.xz"
          mkdir -p $RUNNER_TEMP/Sparkle
          tar -xf $RUNNER_TEMP/Sparkle.tar.xz -C $RUNNER_TEMP/Sparkle

      - name: Generate Appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          mkdir -p $RUNNER_TEMP/release-files
          cp "$RUNNER_TEMP/${{ env.PRODUCT_NAME }}-${{ env.RELEASE_TAG }}.zip" $RUNNER_TEMP/release-files/

          echo "$SPARKLE_PRIVATE_KEY" > $RUNNER_TEMP/sparkle_private_key

          $RUNNER_TEMP/Sparkle/bin/generate_appcast \
            --ed-key-file $RUNNER_TEMP/sparkle_private_key \
            --download-url-prefix "https://github.com/jamesmontemagno/tiny-clips-mac/releases/download/${{ env.RELEASE_TAG }}/" \
            $RUNNER_TEMP/release-files

          mv $RUNNER_TEMP/release-files/appcast.xml $RUNNER_TEMP/appcast.xml

          rm -f $RUNNER_TEMP/sparkle_private_key

      - name: Generate Changelog
        run: |
          git fetch --tags --force
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | grep -vx "${{ env.RELEASE_TAG }}" | head -n 1)
          export PREVIOUS_TAG
          echo "PREVIOUS_TAG=$PREVIOUS_TAG" >> $GITHUB_ENV

          python3 - <<'PY'
          import html
          import os
          import pathlib
          import re
          import subprocess

          release_tag = os.environ["RELEASE_TAG"]
          previous_tag = os.environ.get("PREVIOUS_TAG", "").strip()
          repo = os.environ["GITHUB_REPOSITORY"]
          run_temp = pathlib.Path(os.environ["RUNNER_TEMP"])
          changelog_path = pathlib.Path("CHANGELOG.md")

          markdown_lines: list[str]
          html_chunks: list[str]

          if changelog_path.exists():
            changelog_lines = changelog_path.read_text(encoding="utf-8").splitlines()
          else:
            changelog_lines = []

          start_index = next(
            (index for index, line in enumerate(changelog_lines) if re.match(rf"^##\\s+{re.escape(release_tag)}(?:\\s+-.*)?$", line)),
            None,
          )

          if start_index is not None:
            end_index = next(
              (index for index in range(start_index + 1, len(changelog_lines)) if changelog_lines[index].startswith("## ")),
              len(changelog_lines),
            )
            section_lines = [line.rstrip() for line in changelog_lines[start_index + 1:end_index]]
            while section_lines and not section_lines[0].strip():
              section_lines.pop(0)
            while section_lines and not section_lines[-1].strip():
              section_lines.pop()

            markdown_lines = section_lines or ["- Maintenance release."]
            html_chunks = []
            index = 0
            while index < len(section_lines):
              current_line = section_lines[index].strip()
              if not current_line:
                index += 1
                continue

              if current_line.startswith("### "):
                html_chunks.append(f"<h3>{html.escape(current_line[4:].strip())}</h3>")
                index += 1
                items: list[str] = []
                while index < len(section_lines):
                  candidate = section_lines[index].strip()
                  if not candidate:
                    index += 1
                    if items:
                      break
                    continue
                  if candidate.startswith("### "):
                    break
                  if candidate.startswith("- "):
                    items.append(f"<li>{html.escape(candidate[2:].strip())}</li>")
                  else:
                    html_chunks.append(f"<p>{html.escape(candidate)}</p>")
                  index += 1
                if items:
                  html_chunks.append("<ul>")
                  html_chunks.extend(items)
                  html_chunks.append("</ul>")
                continue

              if current_line.startswith("- "):
                items = []
                while index < len(section_lines):
                  candidate = section_lines[index].strip()
                  if not candidate:
                    index += 1
                    break
                  if not candidate.startswith("- "):
                    break
                  items.append(f"<li>{html.escape(candidate[2:].strip())}</li>")
                  index += 1
                if items:
                  html_chunks.append("<ul>")
                  html_chunks.extend(items)
                  html_chunks.append("</ul>")
                continue

              html_chunks.append(f"<p>{html.escape(current_line)}</p>")
              index += 1
          else:
            command = ["git", "log"]
            if previous_tag:
              command.append(f"{previous_tag}..{release_tag}")
            command.extend(["--pretty=format:- %s", "--no-merges"])
            result = subprocess.run(command, check=True, capture_output=True, text=True)
            markdown_lines = [line for line in result.stdout.splitlines() if line.strip()]
            if not markdown_lines:
              markdown_lines = ["- Maintenance release."]
            html_chunks = ["<h3>What's Changed</h3>", "<ul>"]
            html_chunks.extend(
              f"<li>{html.escape(line[2:].strip() if line.startswith('- ') else line.strip())}</li>"
              for line in markdown_lines
            )
            html_chunks.append("</ul>")

          compare_url = (
            f"https://github.com/{repo}/compare/{previous_tag}...{release_tag}"
            if previous_tag
            else f"https://github.com/{repo}/releases/tag/{release_tag}"
          )
          compare_label = "Full Changelog" if previous_tag else "Release Details"

          markdown_output = markdown_lines + ["", f"**{compare_label}**: {compare_url}"]
          (run_temp / "changelog.md").write_text("\n".join(markdown_output).strip() + "\n", encoding="utf-8")

          html_chunks.append(f'<p><a href="{html.escape(compare_url, quote=True)}">{compare_label}</a></p>')
          (run_temp / "release_notes.html").write_text("".join(html_chunks), encoding="utf-8")
          PY

      - name: Add Release Notes to Appcast
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          from xml.dom import minidom

          sparkle_namespace = "http://www.andymatuschak.org/xml-namespaces/sparkle"
          run_temp = pathlib.Path(os.environ["RUNNER_TEMP"])
          appcast_path = run_temp / "appcast.xml"
          release_notes_html = (run_temp / "release_notes.html").read_text(encoding="utf-8").strip()
          release_notes_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/tag/{os.environ['RELEASE_TAG']}"
          target_version = os.environ["MARKETING_VERSION"]

          document = minidom.parse(str(appcast_path))

          def direct_child(parent, predicate):
            for node in parent.childNodes:
              if node.nodeType == node.ELEMENT_NODE and predicate(node):
                return node
            return None

          target_item = None
          for item in document.getElementsByTagName("item"):
            version_node = direct_child(
              item,
              lambda node: node.namespaceURI == sparkle_namespace and node.localName == "shortVersionString",
            )
            if version_node is not None and version_node.firstChild is not None and version_node.firstChild.nodeValue == target_version:
              target_item = item
              break

          if target_item is None:
            raise SystemExit(f"Could not find appcast item for version {target_version}")

          description_node = direct_child(target_item, lambda node: node.tagName == "description")
          if description_node is None:
            description_node = document.createElement("description")
            enclosure_node = direct_child(target_item, lambda node: node.tagName == "enclosure")
            if enclosure_node is not None:
              target_item.insertBefore(description_node, enclosure_node)
            else:
              target_item.appendChild(description_node)
          while description_node.firstChild is not None:
            description_node.removeChild(description_node.firstChild)
          description_node.appendChild(document.createCDATASection(release_notes_html))

          release_notes_link_node = direct_child(
            target_item,
            lambda node: node.namespaceURI == sparkle_namespace and node.localName == "releaseNotesLink",
          )
          if release_notes_link_node is None:
            release_notes_link_node = document.createElementNS(sparkle_namespace, "sparkle:releaseNotesLink")
            enclosure_node = direct_child(target_item, lambda node: node.tagName == "enclosure")
            if enclosure_node is not None:
              target_item.insertBefore(release_notes_link_node, enclosure_node)
            else:
              target_item.appendChild(release_notes_link_node)
          while release_notes_link_node.firstChild is not None:
            release_notes_link_node.removeChild(release_notes_link_node.firstChild)
          release_notes_link_node.appendChild(document.createTextNode(release_notes_url))

          appcast_path.write_bytes(document.toprettyxml(indent="    ", encoding="utf-8"))
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ${{ runner.temp }}/${{ env.PRODUCT_NAME }}-${{ env.RELEASE_TAG }}.zip
            ${{ runner.temp }}/release-files/*.delta
          body_path: ${{ runner.temp }}/changelog.md
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, 'beta') || contains(env.RELEASE_TAG, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update docs/appcast.xml
        run: |
          cp $RUNNER_TEMP/appcast.xml docs/appcast.xml

      - name: Commit Updated Appcast
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update appcast.xml for ${{ env.RELEASE_TAG }}"
          file_pattern: docs/appcast.xml
          branch: main

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
