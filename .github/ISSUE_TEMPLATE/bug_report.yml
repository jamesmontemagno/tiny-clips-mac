name: Bug report
description: Report a bug in TinyClips
title: "[Bug]: "
labels:
  - bug
assignees: []
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include exact steps so we can reproduce reliably.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: markdown
    attributes:
      value: "### App information"

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 1.2.0
    validations:
      required: true

  - type: input
    id: build
    attributes:
      label: Build
      placeholder: e.g. 123
    validations:
      required: true

  - type: input
    id: distribution
    attributes:
      label: Distribution
      placeholder: Mac App Store or Direct Download
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS
      placeholder: e.g. macOS 15.3.1
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or extra details.
    validations:
      required: false
